name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.ci.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{github.ref}}
            php.cache-from=type=gha,scope=php-refs/heads/main
            php.cache-to=type=gha,scope=php-${{github.ref}},mode=max
            pwa.cache-from=type=gha,scope=pwa-${{github.ref}}
            pwa.cache-from=type=gha,scope=pwa-refs/heads/main
            pwa.cache-to=type=gha,scope=pwa-${{github.ref}},mode=max
      -
        name: Start services
        run: docker compose -f compose.yaml -f compose.ci.yaml up --wait --no-build
      -
        name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost
      -
        name: Check API reachability
        run: curl -vk --fail-with-body https://localhost
      -
        name: Check PWA reachability
        run: "curl -vk --fail-with-body -H 'Accept: text/html' https://localhost"
      -
        name: Check Mercure reachability
        run: curl -vkI --fail-with-body https://localhost/.well-known/mercure?topic=test
      -
        name: Create test database
        run: docker compose -f compose.yaml -f compose.ci.yaml exec -T php bin/console -e test doctrine:database:create
      -
        name: Run migrations
        run: docker compose -f compose.yaml -f compose.ci.yaml exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction
      -
        name: Run PHPUnit
        run: docker compose -f compose.yaml -f compose.ci.yaml exec -T php bin/phpunit --testdox --debug 2>&1
      -
        name: Doctrine Schema Validator
        run: docker compose -f compose.yaml -f compose.ci.yaml exec -T php bin/console -e test doctrine:schema:validate -v
      -
        name: Debug Services
        if: failure()
        run: |
          echo "::group::Container status"
          docker compose -f compose.yaml -f compose.ci.yaml ps
          echo "::endgroup::"
          echo "::group::Container logs"
          docker compose -f compose.yaml -f compose.ci.yaml logs --no-color
          echo "::endgroup::"
          echo "::group::Symfony logs"
          docker compose -f compose.yaml -f compose.ci.yaml exec -T php sh -c 'ls -la var/log/ 2>/dev/null && cat var/log/*.log 2>/dev/null' || true
          echo "::endgroup::"
          echo "::group::PHP error log"
          docker compose -f compose.yaml -f compose.ci.yaml exec -T php sh -c 'tail -200 /var/log/frankenphp.log 2>/dev/null' || true
          echo "::endgroup::"
          echo "::group::Mercure hub config (test env)"
          docker compose -f compose.yaml -f compose.ci.yaml exec -T php sh -c 'bin/console -e test debug:container mercure.hub.default 2>&1 || true'
          echo "::endgroup::"
          echo "::group::Test env vars & kernel cache clear"
          docker compose -f compose.yaml -f compose.ci.yaml exec -T php sh -c 'bin/console -e test cache:clear 2>&1 || true'
          echo "::endgroup::"
          echo "::group::Retry PHPUnit verbose"
          docker compose -f compose.yaml -f compose.ci.yaml exec -T php sh -c 'bin/phpunit --testdox -v 2>&1 | head -500 || true'
          echo "::endgroup::"
  lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
